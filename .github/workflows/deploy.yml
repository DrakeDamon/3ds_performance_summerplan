name: Deploy to GitHub Pages

# Builds the Vite frontend and publishes it to GitHub Pages on every push
# to main. The FastAPI backend in backend/ is NOT deployed here — Pages is
# static-only. The frontend runs in "static mode" (checkout goes straight
# to Stripe Payment Links) until VITE_API_BASE is set to a hosted backend.

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: frontend/package-lock.json
      - name: Install dependencies
        run: npm ci
        working-directory: frontend
      - name: Build
        run: npm run build
        working-directory: frontend
        # To re-enable analytics later: host backend/ somewhere with Python,
        # then add VITE_API_BASE as a repo variable and uncomment:
        # env:
        #   VITE_API_BASE: ${{ vars.VITE_API_BASE }}
      - uses: actions/upload-pages-artifact@v3
        with:
          path: frontend/dist

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
